version: 2.1
orbs:
  win: circleci/windows@5.0
  matlab: mathworks/matlab@1
  
executors:
  linux:
    machine:
      image: ubuntu-2204:2024.01.1
  macos:
    macos:
      xcode: 15.1.0
    resource_class: macos.x86.medium.gen2
  windows:
    win/default
  
jobs:
  build:
    parameters:
      os:
        type: executor
    executor: << parameters.os >> 
    steps:
      - checkout
      - matlab/install
      - restore_cache:
          keys:
            - buildtool-cache
      - matlab/run-build:
          tasks: markdown jupyter
      - matlab/run-build:
          tasks: test
      - save_cache:
          key: buildtool-cache
          paths:
            - .buildtool
            - sample.md
            - sample.ipynb
            - sample.mlx
            - sample_media
            - README.md
            - README.ipynb
            - README.mlx
            - README_media
          
workflows:
  tests-on-all-platforms:
    jobs:
      - build:
          matrix:
            parameters:
              os: [linux, macos, windows]
